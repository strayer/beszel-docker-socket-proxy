# Scheduled binary-mode govulncheck against the latest published image:
# catches vulnerabilities disclosed after the last build, when no PR or
# release would otherwise trigger a scan. This proxy has zero third-party
# dependencies, so its entire vulnerability surface is the Go stdlib and
# toolchain - exactly what govulncheck tracks.
name: Vulncheck

permissions:
  contents: read
  packages: read

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scan:
    name: govulncheck (published image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract binary from latest published image
        run: |
          image=ghcr.io/${{ github.repository }}:latest
          docker pull "$image"
          id=$(docker create "$image")
          docker cp "$id":/proxy ./published-proxy
          docker rm "$id"
      - name: Scan published binary
        run: govulncheck -mode binary ./published-proxy
