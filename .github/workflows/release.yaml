name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # The published image must have passed the full e2e suite as built.
  e2e:
    name: E2E gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build candidate image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: candidate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run unit and e2e suites
        run: |
          go test ./... -cover
          PROXY_IMAGE=candidate:${{ github.sha }} go test ./e2e -tags e2e -v

  build:
    needs: e2e
    uses: docker/github-builder/.github/workflows/build.yml@17bd7d64200cae4ba58ffc099934e8012ae320f2 # v1.10.0
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-mode: max
      output: image
      push: true
      sbom: true
      set-meta-annotations: true
      set-meta-labels: true
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
        type=raw,value=latest
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
